name: Build and Test

on:
  push:
  pull_request:
  schedule:
    # Run Sunday at midnight
    - cron: '0 0 * * 0'

jobs:
  build-linux:
    env:
      dependencies: |
        automake libtool gcc bc libjemalloc2 libjemalloc-dev    \
        libssl-dev llvm-dev libelf-dev libnuma-dev libpcap-dev  \
        selinux-policy-dev ncat
      m32_dependecies: gcc-multilib
      CC:          ${{ matrix.compiler }}
      LIBS:        ${{ matrix.libs }}
      OPTS:        ${{ matrix.ssl }}
      ASAN:        asan

    name: linux ${{ join(matrix.*, ' ') }}
    runs-on: ubuntu-20.04

    strategy:
      fail-fast: false
      matrix:
        ovs:
          - submodule
          - v2.15.0
          - v2.15.1
          - branch-2.15
          - master
        compiler: [gcc, clang]
        platform: [x64]
        ssl: ['', '--disable-ssl']
        libs: ['', '-ljemalloc']
        include:
          - compiler:     gcc
            ssl:          --disable-ssl
            libs:         ''
            platform:     x32
            env:
              M32:        m32

    steps:
    - name: checkout with submodule
      if: matrix.ovs == 'submodule'
      uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: checkout without submodule
      if: matrix.ovs != 'submodule'
      uses: actions/checkout@v2

    - name: checkout OVS
      if: matrix.ovs != 'submodule'
      uses: actions/checkout@v2
      with:
        repository: openvswitch/ovs
        path: ovs
        ref: ${{ matrix.ovs }}

    - name: update APT cache
      run:  sudo apt update

    - name: remove netcat-openbsd
      run:  sudo apt remove -y netcat-openbsd

    - name: install required dependencies
      run:  sudo apt install -y ${{ env.dependencies }}

    - name: install libunbound libunwind
      if:   matrix.m32 == ''
      run:  sudo apt install -y libunbound-dev libunwind-dev

    - name: install 32-bit dependencies
      if:   matrix.m32 != ''
      run:  sudo apt install -y ${{ env.m32_dependecies }}

    - name: fix up /etc/hosts
      # https://github.com/actions/virtual-environments/issues/3353
      run:  |
        cat /etc/hosts
        sudo sed -i "/don't remove this line/d" /etc/hosts || true

    - name: update PATH
      run:  |
        echo "$HOME/bin"        >> $GITHUB_PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: set up python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: prepare
      run:  ./.ci/linux-prepare.sh

    - name: build
      run:  ./.ci/linux-build.sh

    - name: test
      run: |
        touch resolv.conf
        export OVS_RESOLV_CONF=$(pwd)/resolv.conf
        make check -j3 TESTSUITEFLAGS="-j4" RECHECK=yes
        if [ $? -ne 0 ]; then
          cat ./*/_build/sub/tests/testsuite.log tests/testsuite.log
          exit 1
        fi
      if: matrix.ssl == ''

    - name: system-test
      run: |
        make -j4 check-kernel RECHECK=yes
        if [ $? -ne 0 ]; then
          cat tests/system-kmod-testsuite.log
          exit 1
        fi
      if: matrix.ssl == ''

    - name: copy logs on failure
      if: failure() || cancelled()
      run: |
        # upload-artifact@v2 throws exceptions if it tries to upload socket
        # files and we could have some socket files in testsuite.dir.
        # Also, upload-artifact@v2 doesn't work well enough with wildcards.
        # So, we're just archiving everything here to avoid any issues.
        mkdir logs
        cp config.log ./logs/
        cp -r ./*/_build/sub/tests/testsuite.* ./logs/ || true
        # System tests are run as root, need to adjust permissions.
        sudo chmod -R +r ./tests/system-kmod-testsuite.* || true
        cp -r ./tests/system-kmod-testsuite.* ./logs/ || true
        tar -czvf logs.tgz logs/

    - name: upload logs on failure
      if: failure() || cancelled()
      uses: actions/upload-artifact@v2
      with:
        name: logs-linux-${{ join(matrix.*, '-') }}
        path: logs.tgz

  build-osx:
    env:
      CC:    clang
      OPTS:  --disable-ssl

    name:    osx clang --disable-ssl
    runs-on: macos-latest

    steps:
    - name: checkout
      if: github.event_name == 'push' || github.event_name == 'pull_request'
      uses: actions/checkout@v2
      with:
        submodules: recursive
    # For weekly runs, don't update submodules
    - name: checkout without submodule
      if: github.event_name == 'schedule'
      uses: actions/checkout@v2
    # Weekly runs test using OVS master instead of the
    # submodule.
    - name: checkout OVS master
      if: github.event_name == 'schedule'
      uses: actions/checkout@v2
      with:
        repository: 'openvswitch/ovs'
        path: 'ovs'
        ref: 'master'
    - name: install dependencies
      run:  brew install automake libtool
    - name: update PATH
      run:  |
        echo "$HOME/bin"        >> $GITHUB_PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH
    - name: set up python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    - name: prepare
      run:  ./.ci/osx-prepare.sh
    - name: build
      run:  ./.ci/osx-build.sh
    - name: upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v2
      with:
        name: logs-osx-clang---disable-ssl
        path: config.log
